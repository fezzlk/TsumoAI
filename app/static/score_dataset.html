<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>点数データセット生成</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --card: #fffdf8;
        --line: #d8ccb8;
        --text: #2f2a21;
        --accent: #0f766e;
        --accent-2: #115e59;
        --error: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 10%, #fff7e3 0 18%, transparent 19%),
          radial-gradient(circle at 80% 0%, #e4f4ef 0 16%, transparent 17%),
          var(--bg);
      }
      .wrap {
        max-width: 1120px;
        margin: 24px auto;
        padding: 0 16px 40px;
      }
      h1 { margin: 0 0 14px; letter-spacing: 0.02em; }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: 1fr;
      }
      @media (min-width: 980px) {
        .grid { grid-template-columns: 1.25fr 1fr; }
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 8px 20px rgba(28, 28, 30, 0.04);
      }
      .card h2 { margin-top: 0; font-size: 1.08rem; }
      label { display: block; margin: 10px 0 4px; font-weight: 600; }
      input[type="text"], input[type="number"], select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
      }
      textarea { min-height: 84px; }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .checks {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }
      .check {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fff;
      }
      button {
        margin-top: 14px;
        border: 0;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        color: #fff;
        border-radius: 10px;
        font-weight: 700;
        padding: 10px 16px;
        cursor: pointer;
      }
      pre {
        white-space: pre-wrap;
        background: #f8f9fb;
        border-radius: 10px;
        padding: 12px;
        border: 1px solid #e6e8ef;
        font-size: 0.92rem;
      }
      .hint { color: #5f5849; font-size: 0.9rem; }
      .error { color: var(--error); font-weight: 700; }
      .hidden { display: none !important; }
      .disabled-block { opacity: 0.45; pointer-events: none; }
      .section-block {
        border: 1px solid #d8dfeb;
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        margin-bottom: 10px;
      }
      .meld-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 8px;
      }
      .slot-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .tile-slot-btn {
        margin-top: 0;
        background: #334155;
        padding: 6px;
        border-radius: 8px;
        min-width: 54px;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .tile-slot-btn img { width: 36px; height: auto; }
      .winning-tile-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        border: 1px solid #e6e8ef;
        border-radius: 10px;
        background: #fafbfd;
        min-height: 72px;
        margin-top: 6px;
      }
      .winning-tile-btn {
        margin-top: 0;
        border: 2px solid #cbd5e1;
        background: #fff;
        border-radius: 8px;
        padding: 4px;
        min-width: 44px;
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .winning-tile-btn.selected {
        border-color: #0f766e;
        box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.2);
      }
      .winning-tile-btn img { width: 34px; height: auto; }
      .pair-tiles {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
      }
      .pair-tiles img { width: 24px; height: auto; }
      .tile-slot-btn.empty { color: #d1d5db; font-size: 0.72rem; }
      .pair-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 8px;
      }
      .pattern-row { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0 12px; }
      .pattern-item {
        border: 1px solid #d8dfeb;
        border-radius: 10px;
        padding: 8px 10px;
        background: #fff;
      }
      .picker-modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 12px;
        z-index: 1200;
      }
      .picker-modal.open { display: flex; }
      .picker-panel {
        width: min(940px, 100%);
        max-height: 88vh;
        overflow: auto;
        padding: 12px;
        border: 1px solid #d9dde7;
        border-radius: 12px;
        background: #fcfdff;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.18);
      }
      .picker-grid {
        display: grid;
        grid-template-columns: repeat(10, minmax(34px, 1fr));
        gap: 6px;
      }
      .picker-btn {
        border: 1px solid #d0d7e2;
        border-radius: 8px;
        background: #fff;
        padding: 2px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
      }
      .picker-btn img { width: 32px; }
      .option-group { display: flex; flex-wrap: wrap; gap: 8px; }
      .option-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fff;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .dora-item { display: flex; align-items: center; gap: 6px; }
      .mini-btn {
        margin-top: 0;
        padding: 6px 8px;
        border-radius: 8px;
        background: #64748b;
        font-size: 0.8rem;
      }
      .inline-label-row { display: flex; align-items: center; gap: 8px; }
      .dataset-json {
        min-height: 200px;
        font-family: monospace;
        font-size: 0.88rem;
        white-space: pre-wrap;
        background: #1e293b;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 14px;
        border: 1px solid #334155;
      }
      .copy-btn {
        background: #475569;
        margin-top: 8px;
      }
      .copy-btn.copied {
        background: #16a34a;
      }
      .dataset-list {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .dataset-entry {
        border: 1px solid #d8dfeb;
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        font-size: 0.85rem;
      }
      .dataset-entry-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .dataset-entry-header strong {
        font-size: 0.9rem;
      }
      .remove-entry-btn {
        margin-top: 0;
        padding: 4px 8px;
        background: #b91c1c;
        font-size: 0.75rem;
        border-radius: 6px;
      }
      .yaku-edit-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .yaku-edit-row select, .yaku-edit-row input[type="text"] {
        flex: 1;
        min-width: 0;
        padding: 6px 8px;
        font-size: 0.88rem;
      }
      .yaku-edit-row input[type="number"] {
        width: 60px;
        padding: 6px 8px;
        font-size: 0.88rem;
      }
      .yaku-remove-btn {
        margin-top: 0;
        padding: 4px 8px;
        background: #b91c1c;
        font-size: 0.75rem;
        border-radius: 6px;
        flex-shrink: 0;
      }
      .gcs-file-item {
        border: 1px solid #d8dfeb;
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .gcs-file-info {
        flex: 1;
        min-width: 0;
        font-size: 0.85rem;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .gcs-file-info .file-name {
        font-weight: 600;
        word-break: break-all;
      }
      .gcs-file-info .file-meta {
        color: #5f5849;
        font-size: 0.78rem;
      }
      .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>点数データセット生成</h1>
      <p class="hint">牌姿と条件を入力し、点数計算結果と合わせてJSON形式のデータセットを生成します。</p>
      <div class="grid">
        <section class="card">
          <h2>入力</h2>

          <label>和了形</label>
          <div id="tileInputArea">
          <div class="pattern-row">
            <label class="pattern-item"><input type="radio" name="handPattern" value="standard" checked /> 4面子1雀頭</label>
            <label class="pattern-item"><input type="radio" name="handPattern" value="chiitoi" /> 七対子</label>
            <label class="pattern-item"><input type="radio" name="handPattern" value="kokushi" /> 国士無双</label>
          </div>

          <div id="patternStandard" class="section-block">
            <div class="meld-grid" id="standardMelds"></div>
          </div>

          <div id="patternChiitoi" class="section-block hidden">
            <label>対子 x 7</label>
            <div class="pair-grid" id="chiitoiPairs"></div>
          </div>

          <div id="patternKokushi" class="section-block hidden">
            <label>対子（国士無双）</label>
            <div class="slot-row">
              <button type="button" class="tile-slot-btn empty" id="kokushiPairBtn">対子</button>
            </div>
            <p class="hint">構成牌は国士無双13種から、選択した対子1種を重ねた14枚になります。</p>
          </div>
          </div>

          <div id="winningTileBlock">
            <label for="winningTileRow">入力牌（クリックで上がり牌を選択）</label>
            <div id="winningTileRow" class="winning-tile-row"></div>
            <p class="hint">牌入力で組んだ14〜18枚から上がり牌を選択します。</p>
          </div>

          <label class="pattern-item" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:10px;">
            <input type="checkbox" id="jsonDirectSwitch" />
            JSON直接入力
          </label>
          <div class="inline-label-row">
            <label for="handJsonInput" style="margin:0;">手牌JSON（closed_tiles / melds / win_tile）</label>
          </div>
          <textarea id="handJsonInput" disabled></textarea>
          <p class="hint">JSON直接入力ONで編集可能。OFF時は牌入力フォーム状態で自動上書きされます。</p>

          <label>和了方法</label>
          <div class="option-group">
            <label class="option-item"><input type="radio" name="winType" value="ron" checked /> ロン</label>
            <label class="option-item"><input type="radio" name="winType" value="tsumo" /> ツモ</label>
          </div>

          <label>場風</label>
          <div class="option-group">
            <label class="option-item"><input type="radio" name="roundWind" value="E" checked /> 東</label>
            <label class="option-item"><input type="radio" name="roundWind" value="S" /> 南</label>
            <label class="option-item"><input type="radio" name="roundWind" value="W" /> 西</label>
            <label class="option-item"><input type="radio" name="roundWind" value="N" /> 北</label>
          </div>

          <label>自風</label>
          <div class="option-group">
            <label class="option-item"><input type="radio" name="seatWind" value="E" /> 東</label>
            <label class="option-item"><input type="radio" name="seatWind" value="S" checked /> 南</label>
            <label class="option-item"><input type="radio" name="seatWind" value="W" /> 西</label>
            <label class="option-item"><input type="radio" name="seatWind" value="N" /> 北</label>
          </div>

          <label>ドラ入力モード</label>
          <div class="option-group">
            <label class="option-item"><input type="radio" name="doraMode" value="dora" checked /> ドラ入力</label>
            <label class="option-item"><input type="radio" name="doraMode" value="indicator" /> ドラ表示牌入力</label>
          </div>

          <div id="doraTilesBlock">
            <label>ドラ牌</label>
            <div id="doraTileRow" class="slot-row"></div>
            <button id="addDoraTileBtn" type="button" class="mini-btn">ドラ牌を追加</button>
            <label>裏ドラ牌</label>
            <div id="uraDoraTileRow" class="slot-row"></div>
            <button id="addUraDoraTileBtn" type="button" class="mini-btn">裏ドラ牌を追加</button>
          </div>

          <div id="doraIndicatorsBlock" class="hidden">
            <label>ドラ表示牌</label>
            <div id="doraIndicatorRow" class="slot-row"></div>
            <button id="addDoraIndicatorBtn" type="button" class="mini-btn">ドラ表示牌を追加</button>
            <label>裏ドラ表示牌</label>
            <div id="uraDoraIndicatorRow" class="slot-row"></div>
            <button id="addUraDoraIndicatorBtn" type="button" class="mini-btn">裏ドラ表示牌を追加</button>
          </div>

          <div class="row">
            <div>
              <label for="honba">本場</label>
              <input id="honba" type="number" min="0" value="0" />
            </div>
            <div>
              <label for="kyotaku">供託（リーチ棒本数）</label>
              <input id="kyotaku" type="number" min="0" value="0" />
            </div>
          </div>

          <label>連風符</label>
          <div class="option-group">
            <label class="option-item"><input type="radio" name="renpuFu" value="4" checked /> 4符</label>
            <label class="option-item"><input type="radio" name="renpuFu" value="2" /> 2符</label>
          </div>

          <label>フラグ</label>
          <div class="checks">
            <label class="check" style="grid-column: 1 / -1;">
              <span style="display:block;margin-bottom:4px;">立直</span>
              <label style="margin:0 10px 0 0;font-weight:400;"><input type="radio" name="riichiState" value="none" checked /> なし</label>
              <label style="margin:0 10px 0 0;font-weight:400;"><input type="radio" name="riichiState" value="riichi" /> リーチ</label>
              <label style="margin:0;font-weight:400;"><input type="radio" name="riichiState" value="double" /> ダブルリーチ</label>
            </label>
            <label class="check"><input id="ippatsu" type="checkbox" /> 一発</label>
            <label class="check"><input id="haitei" type="checkbox" /> 海底</label>
            <label class="check"><input id="houtei" type="checkbox" /> 河底</label>
            <label class="check"><input id="rinshan" type="checkbox" /> 嶺上</label>
            <label class="check"><input id="chankan" type="checkbox" /> 槍槓</label>
            <label class="check"><input id="chiihou" type="checkbox" /> 地和</label>
            <label class="check"><input id="tenhou" type="checkbox" /> 天和</label>
          </div>

          <button id="generateBtn">点数計算して編集</button>
          <div id="error" class="error"></div>
        </section>

        <section class="card">
          <h2>結果編集</h2>
          <div id="editFormArea" class="hidden">
            <div class="section-block">
              <label>役一覧</label>
              <div id="editYakuList"></div>
              <div style="display:flex;gap:8px;margin-top:8px;">
                <button id="addYakuBtn" type="button" class="mini-btn">役を追加</button>
              </div>
            </div>

            <div class="row" style="margin-top:10px;">
              <div>
                <label for="editHan">合計翻数</label>
                <input id="editHan" type="number" min="0" value="0" />
              </div>
              <div>
                <label for="editFu">符</label>
                <input id="editFu" type="number" min="0" step="10" value="30" />
              </div>
            </div>

            <div class="section-block" style="margin-top:10px;">
              <label>自動算出点数</label>
              <div id="editPointsDisplay" class="hint"></div>
            </div>

            <div style="display:flex;gap:8px;margin-top:10px;">
              <button id="confirmEntryBtn" type="button">確定してデータセットに追加</button>
              <button id="cancelEditBtn" type="button" class="mini-btn" style="background:#b91c1c;">キャンセル</button>
            </div>
          </div>
          <div id="editPlaceholder" class="hint">左の入力欄で条件を設定し「点数計算して編集」を押すと、ここに編集フォームが表示されます。</div>

          <h2 style="margin-top:20px;">データセット</h2>
          <div class="dataset-list" id="datasetList"></div>

          <label>全体JSON</label>
          <pre class="dataset-json" id="datasetJson">[]</pre>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            <button id="copyJsonBtn" class="copy-btn" type="button">JSONをコピー</button>
            <button id="uploadGcsBtn" type="button">GCSにアップロード</button>
            <button id="clearAllBtn" class="mini-btn" type="button" style="background:#b91c1c;">全てクリア</button>
          </div>
          <div id="uploadStatus" class="hint" style="margin-top:6px;"></div>

          <h2 style="margin-top:20px;">GCS保存済みデータセット</h2>
          <button id="refreshGcsListBtn" type="button" class="mini-btn" style="margin-bottom:8px;">一覧を更新</button>
          <div id="gcsFileList" class="dataset-list"></div>
          <div id="gcsListStatus" class="hint"></div>
        </section>
      </div>
    </main>

    <div id="tilePickerModal" class="picker-modal">
      <div class="picker-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <div id="tilePickerTarget" class="hint" style="margin:0;"></div>
          <button id="closeTilePickerBtn" type="button" style="margin-top:0;background:#64748b;">閉じる</button>
        </div>
        <div class="option-group" style="margin-bottom:10px;">
          <label class="option-item">
            <input id="tilePickerApplyAllSame" type="checkbox" />
            同じ牌をまとめて入力
          </label>
          <label class="option-item">
            <input id="tilePickerApplyShuntsu" type="checkbox" />
            順子で入力
          </label>
        </div>
        <div id="tilePickerGrid" class="picker-grid"></div>
      </div>
    </div>

    <script>
      const KOKUSHI_TILES = ["1m","9m","1p","9p","1s","9s","E","S","W","N","P","F","C"];
      const TILE_LIST = [
        "1m","2m","3m","4m","5m","6m","7m","8m","9m","5mr",
        "1p","2p","3p","4p","5p","6p","7p","8p","9p","5pr",
        "1s","2s","3s","4s","5s","6s","7s","8s","9s","5sr",
        "E","S","W","N","P","F","C"
      ];

      function value(id) { return document.getElementById(id).value; }
      function checked(id) { return document.getElementById(id).checked; }
      function toInt(id) { return Number.parseInt(value(id), 10) || 0; }
      function radioValue(name) {
        const checkedInput = document.querySelector(`input[name="${name}"]:checked`);
        return checkedInput ? checkedInput.value : "";
      }

      function tileToFilename(tileCode) {
        const t = tileCode.trim();
        if (/^5[smpr]r$/.test(t)) return `Mpu0${t[1]}.png`;
        if (/^[1-9][mps]$/.test(t)) return `Mpu${t[0]}${t[1]}.png`;
        const honors = { E: "1", S: "2", W: "3", N: "4", P: "5", F: "6", C: "7" };
        if (honors[t]) return `Mpu${honors[t]}z.png`;
        return null;
      }

      /* ── Tile Picker Modal ── */
      class TilePickerModalComponent {
        constructor(modalId, gridId, targetId, closeBtnId) {
          this.modal = document.getElementById(modalId);
          this.grid = document.getElementById(gridId);
          this.target = document.getElementById(targetId);
          this.closeBtn = document.getElementById(closeBtnId);
          this.applyAllSame = document.getElementById("tilePickerApplyAllSame");
          this.applyShuntsu = document.getElementById("tilePickerApplyShuntsu");
          this.selectHandler = null;
          this._renderGrid();
          this.closeBtn.addEventListener("click", () => this.close());
          this.modal.addEventListener("click", (e) => {
            if (e.target === this.modal) this.close();
          });
          this.applyAllSame.addEventListener("change", () => {
            if (this.applyAllSame.checked) this.applyShuntsu.checked = false;
          });
          this.applyShuntsu.addEventListener("change", () => {
            if (this.applyShuntsu.checked) this.applyAllSame.checked = false;
          });
        }
        _renderGrid() {
          this.grid.innerHTML = "";
          TILE_LIST.forEach((tile) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "picker-btn";
            btn.title = tile;
            const filename = tileToFilename(tile);
            if (filename) {
              const img = document.createElement("img");
              img.src = `/static/tiles/${filename}`;
              img.alt = tile;
              btn.appendChild(img);
            } else {
              btn.textContent = tile;
            }
            btn.addEventListener("click", () => {
              if (this.selectHandler) {
                this.selectHandler(tile, {
                  applyAllSame: this.applyAllSame.checked,
                  applyShuntsu: this.applyShuntsu.checked
                });
              }
              this.close();
            });
            this.grid.appendChild(btn);
          });
        }
        open(targetText, onSelect) {
          this.target.textContent = targetText ? `${targetText}を入力` : "";
          this.selectHandler = onSelect;
          this.applyAllSame.checked = false;
          this.applyShuntsu.checked = false;
          this.modal.classList.add("open");
        }
        close() {
          this.selectHandler = null;
          this.applyAllSame.checked = false;
          this.applyShuntsu.checked = false;
          this.modal.classList.remove("open");
        }
      }

      const picker = new TilePickerModalComponent("tilePickerModal", "tilePickerGrid", "tilePickerTarget", "closeTilePickerBtn");

      /* ── UI State ── */
      const uiState = {
        pattern: "standard",
        jsonDirect: false,
        selectedWinTileIndex: null,
        doraMode: "dora",
        handJsonFromTiles: { closed_tiles: [], melds: [], win_tile: "" },
        doraTiles: ["4m"],
        uraDoraTiles: [],
        doraIndicators: ["4m"],
        uraDoraIndicators: [],
        standard: {
          melds: [
            { type: "concealed", tiles: ["1m", "2m", "3m", null] },
            { type: "concealed", tiles: ["4p", "5p", "6p", null] },
            { type: "concealed", tiles: ["7s", "8s", "9s", null] },
            { type: "concealed", tiles: ["E", "E", "E", null] }
          ],
          pair: ["2p", "2p"]
        },
        chiitoi: { pairs: Array.from({ length: 7 }, () => null) },
        kokushi: { pair: null }
      };

      const datasetEntries = [];

      /* ── Slot/Pair rendering ── */
      function setSlotButtonContent(btn, tile) {
        btn.classList.toggle("empty", !tile);
        btn.innerHTML = "";
        if (!tile) { btn.textContent = "未選択"; return; }
        const filename = tileToFilename(tile);
        if (!filename) { btn.textContent = tile; return; }
        const img = document.createElement("img");
        img.src = `/static/tiles/${filename}`;
        img.alt = tile;
        btn.appendChild(img);
      }

      function setPairButtonContent(btn, tile) {
        btn.classList.toggle("empty", !tile);
        btn.innerHTML = "";
        if (!tile) { btn.textContent = "未選択"; return; }
        const filename = tileToFilename(tile);
        if (!filename) { btn.textContent = `${tile}${tile}`; return; }
        const wrap = document.createElement("div");
        wrap.className = "pair-tiles";
        for (let i = 0; i < 2; i++) {
          const img = document.createElement("img");
          img.src = `/static/tiles/${filename}`;
          img.alt = tile;
          wrap.appendChild(img);
        }
        btn.appendChild(wrap);
      }

      function requiredMeldLen(type) {
        return ["kan", "ankan", "kakan"].includes(type) ? 4 : 3;
      }

      function buildShuntsuTiles(tile) {
        const t = (tile || "").replace(/r$/, "");
        if (!/^[1-9][mps]$/.test(t)) return null;
        const suit = t[1];
        let start = Number.parseInt(t[0], 10);
        if (start >= 8) start = 7;
        return [`${start}${suit}`, `${start + 1}${suit}`, `${start + 2}${suit}`];
      }

      /* ── Dora rendering ── */
      function renderDoraList(rootId, list, labelPrefix, fallbackTile, minItems = 1) {
        const root = document.getElementById(rootId);
        root.innerHTML = "";
        list.forEach((tile, idx) => {
          const item = document.createElement("div");
          item.className = "dora-item";
          const pickBtn = document.createElement("button");
          pickBtn.type = "button";
          pickBtn.className = "tile-slot-btn";
          setSlotButtonContent(pickBtn, tile);
          pickBtn.addEventListener("click", () => {
            picker.open(`${labelPrefix}${idx + 1}`, (selected) => {
              list[idx] = selected;
              renderDoraInputs();
            });
          });
          item.appendChild(pickBtn);
          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "mini-btn";
          delBtn.textContent = "削除";
          delBtn.disabled = list.length <= minItems;
          delBtn.addEventListener("click", () => {
            list.splice(idx, 1);
            while (list.length < minItems) list.push(fallbackTile);
            renderDoraInputs();
          });
          item.appendChild(delBtn);
          root.appendChild(item);
        });
      }

      function syncDoraModeFromUi() {
        uiState.doraMode = radioValue("doraMode") || "dora";
        document.getElementById("doraTilesBlock").classList.toggle("hidden", uiState.doraMode !== "dora");
        document.getElementById("doraIndicatorsBlock").classList.toggle("hidden", uiState.doraMode !== "indicator");
      }

      function renderDoraInputs() {
        renderDoraList("doraTileRow", uiState.doraTiles, "ドラ牌", "4m", 1);
        renderDoraList("uraDoraTileRow", uiState.uraDoraTiles, "裏ドラ牌", "4m", 0);
        renderDoraList("doraIndicatorRow", uiState.doraIndicators, "ドラ表示牌", "4m", 1);
        renderDoraList("uraDoraIndicatorRow", uiState.uraDoraIndicators, "裏ドラ表示牌", "4m", 0);
        syncDoraModeFromUi();
      }

      /* ── Hand tile flattening ── */
      function flattenHandTiles(hand) {
        const out = [];
        (hand.closed_tiles || []).forEach((tile) => out.push(tile));
        (hand.melds || []).forEach((meld) => (meld.tiles || []).forEach((tile) => out.push(tile)));
        return out;
      }

      /* ── Winning tile selector ── */
      function renderWinningTileSelector() {
        const row = document.getElementById("winningTileRow");
        row.innerHTML = "";
        const tiles = flattenHandTiles(uiState.handJsonFromTiles);
        if (!tiles.length) {
          const empty = document.createElement("div");
          empty.className = "hint";
          empty.textContent = "牌を入力するとここに表示されます";
          row.appendChild(empty);
          return;
        }
        tiles.forEach((tile, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "winning-tile-btn";
          if (idx === uiState.selectedWinTileIndex) btn.classList.add("selected");
          const filename = tileToFilename(tile);
          if (filename) {
            const img = document.createElement("img");
            img.src = `/static/tiles/${filename}`;
            img.alt = tile;
            img.title = `上がり牌に選択: ${tile}`;
            btn.appendChild(img);
          } else {
            btn.textContent = tile;
          }
          btn.addEventListener("click", () => {
            uiState.selectedWinTileIndex = idx;
            uiState.handJsonFromTiles.win_tile = tile;
            if (!uiState.jsonDirect) {
              document.getElementById("handJsonInput").value = JSON.stringify(uiState.handJsonFromTiles, null, 2);
            }
            renderWinningTileSelector();
          });
          row.appendChild(btn);
        });
      }

      function applySelectedWinTile(hand) {
        const tiles = flattenHandTiles(hand);
        if (!tiles.length) {
          hand.win_tile = "";
          uiState.selectedWinTileIndex = null;
          return hand;
        }
        if (uiState.selectedWinTileIndex === null || uiState.selectedWinTileIndex < 0 || uiState.selectedWinTileIndex >= tiles.length) {
          uiState.selectedWinTileIndex = tiles.length - 1;
        }
        hand.win_tile = tiles[uiState.selectedWinTileIndex];
        return hand;
      }

      /* ── Pattern inputs ── */
      function buildStandardMeldInputs() {
        const root = document.getElementById("standardMelds");
        root.innerHTML = "";
        uiState.standard.melds.forEach((m, idx) => {
          const block = document.createElement("div");
          block.className = "section-block";
          const title = document.createElement("label");
          title.textContent = `面子${idx + 1}`;
          block.appendChild(title);
          const sel = document.createElement("select");
          sel.innerHTML = `
            <option value="concealed">副露なし</option>
            <option value="pon">碰（ポン）</option>
            <option value="chi">吃（チー）</option>
            <option value="ankan">暗槓（アンカン）</option>
            <option value="kan">明槓（ミンカン）</option>
          `;
          sel.value = m.type;
          sel.addEventListener("change", () => {
            m.type = sel.value;
            if (requiredMeldLen(m.type) === 3) m.tiles[3] = null;
            renderAllPatternInputs();
          });
          block.appendChild(sel);
          const row = document.createElement("div");
          row.className = "slot-row";
          const needed = requiredMeldLen(m.type);
          for (let i = 0; i < 4; i++) {
            const b = document.createElement("button");
            b.type = "button";
            b.className = "tile-slot-btn";
            if (i >= needed) b.classList.add("hidden");
            setSlotButtonContent(b, m.tiles[i]);
            b.addEventListener("click", () => {
              picker.open(`面子${idx + 1} 牌${i + 1}`, (tile, options = {}) => {
                if (options.applyShuntsu && needed === 3) {
                  const shuntsu = buildShuntsuTiles(tile);
                  if (shuntsu) {
                    m.tiles[0] = shuntsu[0]; m.tiles[1] = shuntsu[1]; m.tiles[2] = shuntsu[2];
                  } else { m.tiles[i] = tile; }
                } else if (options.applyAllSame) {
                  for (let j = 0; j < needed; j++) m.tiles[j] = tile;
                } else { m.tiles[i] = tile; }
                renderAllPatternInputs();
              });
            });
            row.appendChild(b);
          }
          block.appendChild(row);
          root.appendChild(block);
        });

        const pairBlock = document.createElement("div");
        pairBlock.className = "section-block";
        const pairTitle = document.createElement("label");
        pairTitle.textContent = "雀頭";
        pairBlock.appendChild(pairTitle);
        const pairRow = document.createElement("div");
        pairRow.className = "slot-row";
        for (let i = 0; i < 2; i++) {
          const pairBtn = document.createElement("button");
          pairBtn.type = "button";
          pairBtn.className = "tile-slot-btn";
          setSlotButtonContent(pairBtn, uiState.standard.pair[i]);
          pairBtn.addEventListener("click", () => {
            picker.open(`4面子1雀頭 雀頭${i + 1}`, (tile, options = {}) => {
              if (options.applyAllSame) {
                uiState.standard.pair[0] = tile; uiState.standard.pair[1] = tile;
              } else { uiState.standard.pair[i] = tile; }
              renderAllPatternInputs();
            });
          });
          pairRow.appendChild(pairBtn);
        }
        pairBlock.appendChild(pairRow);
        root.appendChild(pairBlock);
      }

      function renderPairSlotButton(id, tile, label, setter) {
        const btn = document.getElementById(id);
        setSlotButtonContent(btn, tile);
        btn.onclick = () => {
          picker.open(label, (selected, options = {}) => {
            setter(selected, options);
            renderAllPatternInputs();
          });
        };
      }

      function buildChiitoiInputs() {
        const root = document.getElementById("chiitoiPairs");
        root.innerHTML = "";
        uiState.chiitoi.pairs.forEach((tile, i) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "tile-slot-btn";
          setPairButtonContent(b, tile);
          b.onclick = () => {
            picker.open(`七対子 対子${i + 1}`, (selected) => {
              uiState.chiitoi.pairs[i] = selected;
              renderAllPatternInputs();
            });
          };
          root.appendChild(b);
        });
      }

      function switchPattern(pattern) {
        uiState.pattern = pattern;
        document.getElementById("patternStandard").classList.toggle("hidden", pattern !== "standard");
        document.getElementById("patternChiitoi").classList.toggle("hidden", pattern !== "chiitoi");
        document.getElementById("patternKokushi").classList.toggle("hidden", pattern !== "kokushi");
        renderAllPatternInputs();
        syncHandJsonFromState();
      }

      function renderAllPatternInputs() {
        buildStandardMeldInputs();
        buildChiitoiInputs();
        renderPairSlotButton("kokushiPairBtn", uiState.kokushi.pair, "国士無双 対子", (tile) => {
          uiState.kokushi.pair = tile;
        });
        syncHandJsonFromState();
      }

      function setTileInputEnabled(enabled) {
        const root = document.getElementById("tileInputArea");
        root.classList.toggle("disabled-block", !enabled);
        const controls = root.querySelectorAll("button, select, input[type='radio']");
        controls.forEach((el) => { el.disabled = !enabled; });
        const winningBlock = document.getElementById("winningTileBlock");
        winningBlock.classList.toggle("disabled-block", !enabled);
        winningBlock.querySelectorAll("button").forEach((el) => { el.disabled = !enabled; });
        if (!enabled) picker.close();
      }

      /* ── Build hand from pattern state ── */
      function buildHandByPatternState() {
        if (uiState.pattern === "standard") {
          const pairA = uiState.standard.pair[0];
          const pairB = uiState.standard.pair[1];
          if (!pairA || !pairB) throw new Error("対子を2枚入力してください");
          if (pairA !== pairB) throw new Error("雀頭は同じ牌を2枚入力してください");
          const closedTiles = [pairA, pairB];
          const melds = [];
          for (const meld of uiState.standard.melds) {
            const need = requiredMeldLen(meld.type);
            const tiles = meld.tiles.slice(0, need);
            if (tiles.some((t) => !t)) throw new Error("4面子1雀頭の面子牌が不足しています");
            if (meld.type === "concealed") {
              closedTiles.push(...tiles);
            } else {
              melds.push({ type: meld.type, tiles, open: meld.type !== "ankan" });
            }
          }
          const kanCount = melds.filter((m) => ["kan", "ankan", "kakan"].includes(m.type)).length;
          const total = closedTiles.length + melds.reduce((n, m) => n + m.tiles.length, 0);
          const expectedTotal = 14 + kanCount;
          if (total !== expectedTotal) throw new Error(`牌数が${expectedTotal}枚になっていません`);
          return applySelectedWinTile({ closed_tiles: closedTiles, melds, win_tile: "" });
        }
        if (uiState.pattern === "chiitoi") {
          if (uiState.chiitoi.pairs.some((p) => !p)) throw new Error("七対子の対子が不足しています");
          const closedTiles = [];
          uiState.chiitoi.pairs.forEach((p) => { closedTiles.push(p, p); });
          return applySelectedWinTile({ closed_tiles: closedTiles, melds: [], win_tile: "" });
        }
        if (!uiState.kokushi.pair) throw new Error("国士無双の対子を入力してください");
        if (!KOKUSHI_TILES.includes(uiState.kokushi.pair.replace("r", ""))) {
          throw new Error("国士無双の対子は么九牌/字牌を選んでください");
        }
        const base = [...KOKUSHI_TILES];
        const closedTiles = [...base, uiState.kokushi.pair];
        return applySelectedWinTile({ closed_tiles: closedTiles, melds: [], win_tile: "" });
      }

      function buildHandDraftByPatternState() {
        if (uiState.pattern === "standard") {
          const closedTiles = [];
          const melds = [];
          if (uiState.standard.pair[0]) closedTiles.push(uiState.standard.pair[0]);
          if (uiState.standard.pair[1]) closedTiles.push(uiState.standard.pair[1]);
          for (const meld of uiState.standard.melds) {
            const need = requiredMeldLen(meld.type);
            const tiles = meld.tiles.slice(0, need).filter(Boolean);
            if (meld.type === "concealed") { closedTiles.push(...tiles); }
            else { melds.push({ type: meld.type, tiles, open: meld.type !== "ankan" }); }
          }
          return applySelectedWinTile({ closed_tiles: closedTiles, melds, win_tile: closedTiles[closedTiles.length - 1] || "" });
        }
        if (uiState.pattern === "chiitoi") {
          const closedTiles = [];
          uiState.chiitoi.pairs.forEach((p) => { if (p) closedTiles.push(p, p); });
          return applySelectedWinTile({ closed_tiles: closedTiles, melds: [], win_tile: "" });
        }
        const closedTiles = [...KOKUSHI_TILES];
        if (uiState.kokushi.pair) closedTiles.push(uiState.kokushi.pair);
        return applySelectedWinTile({ closed_tiles: closedTiles, melds: [], win_tile: "" });
      }

      function syncHandJsonFromState() {
        try { uiState.handJsonFromTiles = buildHandByPatternState(); }
        catch { uiState.handJsonFromTiles = buildHandDraftByPatternState(); }
        renderWinningTileSelector();
        if (uiState.jsonDirect) return;
        document.getElementById("handJsonInput").value = JSON.stringify(uiState.handJsonFromTiles, null, 2);
      }

      function readHandFromJsonInput() {
        let parsed;
        try { parsed = JSON.parse(value("handJsonInput")); }
        catch { throw new Error("手牌JSONの形式が不正です"); }
        if (!parsed || typeof parsed !== "object") throw new Error("手牌JSONはオブジェクトで入力してください");
        if (!Array.isArray(parsed.closed_tiles)) throw new Error("手牌JSON: closed_tiles は配列が必要です");
        if (!Array.isArray(parsed.melds)) throw new Error("手牌JSON: melds は配列が必要です");
        if (!parsed.win_tile || typeof parsed.win_tile !== "string") throw new Error("手牌JSON: win_tile は文字列が必要です");
        return parsed;
      }

      function buildHandByPattern() {
        return uiState.jsonDirect ? readHandFromJsonInput() : buildHandByPatternState();
      }

      function toDoraIndicatorFromDoraTile(tile) {
        const t = (tile || "").replace(/r$/, "");
        if (/^[1-9][mps]$/.test(t)) {
          const n = Number.parseInt(t[0], 10);
          const suit = t[1];
          return `${n === 1 ? 9 : n - 1}${suit}`;
        }
        if (["E", "S", "W", "N"].includes(t)) {
          const order = ["E", "S", "W", "N"];
          return order[(order.indexOf(t) + order.length - 1) % order.length];
        }
        if (["P", "F", "C"].includes(t)) {
          const order = ["P", "F", "C"];
          return order[(order.indexOf(t) + order.length - 1) % order.length];
        }
        return t;
      }

      /* ── Build payload ── */
      function buildPayload() {
        const hand = buildHandByPattern();
        const activeDoraValues = (uiState.doraMode === "indicator" ? uiState.doraIndicators : uiState.doraTiles).filter(Boolean);
        const activeUraDoraValues = (uiState.doraMode === "indicator" ? uiState.uraDoraIndicators : uiState.uraDoraTiles).filter(Boolean);
        const doraIndicators =
          uiState.doraMode === "indicator" ? activeDoraValues : activeDoraValues.map(toDoraIndicatorFromDoraTile);
        const uraDoraIndicators =
          uiState.doraMode === "indicator" ? activeUraDoraValues : activeUraDoraValues.map(toDoraIndicatorFromDoraTile);
        const riichiState = radioValue("riichiState") || "none";
        return {
          hand,
          context: {
            win_type: radioValue("winType"),
            is_dealer: radioValue("seatWind") === "E",
            round_wind: radioValue("roundWind"),
            seat_wind: radioValue("seatWind"),
            riichi: riichiState === "riichi",
            double_riichi: riichiState === "double",
            ippatsu: checked("ippatsu"),
            haitei: checked("haitei"),
            houtei: checked("houtei"),
            rinshan: checked("rinshan"),
            chankan: checked("chankan"),
            chiihou: checked("chiihou"),
            tenhou: checked("tenhou"),
            dora_indicators: doraIndicators,
            ura_dora_indicators: uraDoraIndicators,
            aka_dora_count: 0,
            honba: toInt("honba"),
            kyotaku: toInt("kyotaku")
          },
          rules: {
            aka_ari: true,
            kuitan_ari: true,
            double_yakuman_ari: true,
            kazoe_yakuman_ari: true,
            renpu_fu: Number.parseInt(radioValue("renpuFu"), 10) || 4
          }
        };
      }

      /* ── Format conversion helpers ── */
      const YAKU_JA_TO_EN = {
        "ダブル立直": "Double Riichi",
        "ドラ": "Dora",
        "一気通貫": "Pure Straight",
        "一発": "Ippatsu",
        "一盃口": "Pure Double Sequence",
        "七対子": "Seven Pairs",
        "三暗刻": "3 Concealed Triplets",

        "混老頭": "All Terminals and Honors",
        "清一色": "Full Flush",
        "清老頭": "All Terminals",
        "立直": "Riichi",
        "純全帯么九": "Pure Outside Hand",
        "純正九蓮宝燈": "Pure Nine Gates",
        "緑一色": "All Green",
        "自風牌": "Seat Wind",
        "裏ドラ": "Ura Dora",
        "赤ドラ": "Red Five",
        "門前清自摸和": "Fully Concealed Hand"
      };

      const WIND_TO_EN = { E: "east", S: "south", W: "west", N: "north" };

      function tileCodeToNumber(code) {
        const t = (code || "").trim();
        if (t === "5mr") return 10;
        if (t === "5pr") return 20;
        if (t === "5sr") return 30;
        if (/^[1-9]m$/.test(t)) return 10 + parseInt(t[0]);
        if (/^[1-9]p$/.test(t)) return 20 + parseInt(t[0]);
        if (/^[1-9]s$/.test(t)) return 30 + parseInt(t[0]);
        const honorMap = { E: 41, S: 42, W: 43, N: 44, P: 45, F: 46, C: 47 };
        return honorMap[t] || null;
      }

      function convertToDatasetFormat(payload, result) {
        const ctx = payload.context;
        const hand = payload.hand;
        const r = result;
        const isDealer = ctx.seat_wind === "E";
        const isTsumo = ctx.win_type === "tsumo";

        const input = {
          round: {
            honba: ctx.honba,
            bakaze: WIND_TO_EN[ctx.round_wind] || ctx.round_wind,
            dora_indicators: ctx.dora_indicators.map(tileCodeToNumber),
            ura_dora_indicators: ctx.ura_dora_indicators.map(tileCodeToNumber)
          },
          win: {
            jikaze: WIND_TO_EN[ctx.seat_wind] || ctx.seat_wind,
            win_type: ctx.win_type
          },
          yaku_context: {
            is_riichi: ctx.riichi,
            is_double_riichi: ctx.double_riichi,
            is_ippatsu: ctx.ippatsu,
            is_tenhou: ctx.tenhou,
            is_chiihou: ctx.chiihou,
            is_under_the_river: ctx.houtei,
            is_under_the_sea: ctx.haitei,
            is_rinshan_kaihou: ctx.rinshan,
            is_robbing_a_quad: ctx.chankan
          },
          winning_hand: {
            closed_tiles: hand.closed_tiles.map(tileCodeToNumber),
            melds: (hand.melds || []).map((m) => ({
              type: m.type,
              tiles: m.tiles.map(tileCodeToNumber)
            })),
            winning_tile: tileCodeToNumber(hand.win_tile)
          }
        };

        let oyaPayment = null;
        let koPayment = null;
        if (isTsumo) {
          if (isDealer) {
            koPayment = r.points.tsumo_non_dealer_pay;
          } else {
            oyaPayment = r.points.tsumo_dealer_pay;
            koPayment = r.points.tsumo_non_dealer_pay;
          }
        }

        const yakuList = (r.yaku || []).map((y) => ({
          name: YAKU_JA_TO_EN[y.name] || y.name,
          han: y.han
        }));
        (r.yakuman || []).forEach((name) => {
          yakuList.push({ name: YAKU_JA_TO_EN[name] || name, han: 0 });
        });

        const output = {
          han: r.han,
          fu: r.fu || null,
          oya_payment: oyaPayment,
          ko_payment: koPayment,
          yaku: yakuList
        };

        return { input, output };
      }

      /* ── Points auto-calculation ── */
      const ALL_YAKU_EN = [
        "Riichi","Double Riichi","Ippatsu","Fully Concealed Hand","Pinfu",
        "All Simples","Pure Double Sequence","Seat Wind","Prevalent Wind",
        "Little Three Dragons","Mixed Triple Sequence","Pure Straight",
        "Half Outside Hand","All Triplets","3 Concealed Triplets","3 Quads",
        "Mixed Triple Triplets","Seven Pairs","Half Flush","Full Flush",
        "Pure Outside Hand","Twice Pure Double Sequence",
        "All Terminals and Honors","Half Outside Hand",
        "Under the Sea","Under the River","After a Quad","Robbing a Quad",
        "Dora","Ura Dora","Red Five",
        "Nagashi Mangan",
        "Thirteen Orphans","Thirteen Orphans (13 Waits)",
        "Four Concealed Triplets","Four Concealed Triplets (Single Wait)",
        "Big Three Dragons","Little Four Winds","Big Four Winds",
        "All Honors","All Terminals","All Green","Nine Gates","Pure Nine Gates",
        "Four Quads","Heavenly Hand","Earthly Hand"
      ];

      function calcBasePoints(han, fu) {
        if (han >= 78) return 8000 * Math.floor(han / 13);
        if (han >= 13) return 8000;
        if (han >= 11) return 6000;
        if (han >= 8) return 4000;
        if (han >= 6) return 3000;
        if (han >= 5) return 2000;
        if (han === 4 && fu >= 30) return 2000;
        if (han === 3 && fu >= 70) return 2000;
        const base = fu * Math.pow(2, han + 2);
        return Math.min(base, 2000);
      }

      function ceilTo100(n) { return Math.ceil(n / 100) * 100; }

      function calcPayments(han, fu, isDealer, isTsumo) {
        const base = calcBasePoints(han, fu);
        if (isTsumo) {
          if (isDealer) {
            return { oya_payment: null, ko_payment: ceilTo100(base * 2) };
          }
          return { oya_payment: ceilTo100(base * 2), ko_payment: ceilTo100(base) };
        }
        return { oya_payment: null, ko_payment: null };
      }

      /* ── Edit form state ── */
      let editState = null; // { input, editingIndex }

      function openEditForm(input, yakuList, han, fu, editingIndex) {
        editState = { input, editingIndex };
        document.getElementById("editFormArea").classList.remove("hidden");
        document.getElementById("editPlaceholder").classList.add("hidden");
        editState.yakuList = yakuList.map((y) => ({ ...y }));
        document.getElementById("editHan").value = han;
        document.getElementById("editFu").value = fu || 30;
        renderEditYakuList();
        recalcEditPoints();
      }

      function closeEditForm() {
        editState = null;
        document.getElementById("editFormArea").classList.add("hidden");
        document.getElementById("editPlaceholder").classList.remove("hidden");
      }

      function renderEditYakuList() {
        const root = document.getElementById("editYakuList");
        root.innerHTML = "";
        editState.yakuList.forEach((y, idx) => {
          const row = document.createElement("div");
          row.className = "yaku-edit-row";

          const sel = document.createElement("select");
          const customOpt = document.createElement("option");
          customOpt.value = "__custom__";
          customOpt.textContent = "-- 手入力 --";
          sel.appendChild(customOpt);
          ALL_YAKU_EN.forEach((name) => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
          });
          if (ALL_YAKU_EN.includes(y.name)) {
            sel.value = y.name;
          } else {
            sel.value = "__custom__";
          }
          sel.addEventListener("change", () => {
            if (sel.value !== "__custom__") {
              editState.yakuList[idx].name = sel.value;
              textInput.value = sel.value;
              textInput.classList.add("hidden");
            } else {
              textInput.classList.remove("hidden");
              textInput.value = editState.yakuList[idx].name;
              textInput.focus();
            }
            syncHanFromYaku();
          });
          row.appendChild(sel);

          const textInput = document.createElement("input");
          textInput.type = "text";
          textInput.value = y.name;
          textInput.placeholder = "役名(英語)";
          textInput.className = ALL_YAKU_EN.includes(y.name) ? "hidden" : "";
          textInput.addEventListener("input", () => {
            editState.yakuList[idx].name = textInput.value;
          });
          row.appendChild(textInput);

          const hanInput = document.createElement("input");
          hanInput.type = "number";
          hanInput.min = "0";
          hanInput.value = y.han;
          hanInput.title = "翻数";
          hanInput.addEventListener("input", () => {
            editState.yakuList[idx].han = parseInt(hanInput.value) || 0;
            syncHanFromYaku();
          });
          row.appendChild(hanInput);

          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "yaku-remove-btn";
          removeBtn.textContent = "×";
          removeBtn.addEventListener("click", () => {
            editState.yakuList.splice(idx, 1);
            renderEditYakuList();
            syncHanFromYaku();
          });
          row.appendChild(removeBtn);

          root.appendChild(row);
        });
      }

      function syncHanFromYaku() {
        const total = editState.yakuList.reduce((s, y) => s + (y.han || 0), 0);
        document.getElementById("editHan").value = total;
        recalcEditPoints();
      }

      function recalcEditPoints() {
        if (!editState) return;
        const han = parseInt(document.getElementById("editHan").value) || 0;
        const fu = parseInt(document.getElementById("editFu").value) || 0;
        const isDealer = editState.input.win.jikaze === "east";
        const isTsumo = editState.input.win.win_type === "tsumo";
        const { oya_payment, ko_payment } = calcPayments(han, fu, isDealer, isTsumo);
        const parts = [];
        if (isTsumo) {
          if (isDealer) {
            parts.push(`子各 ${ko_payment} オール`);
          } else {
            parts.push(`親 ${oya_payment} / 子各 ${ko_payment}`);
          }
        } else {
          const ronPts = isDealer ? ceilTo100(calcBasePoints(han, fu) * 6) : ceilTo100(calcBasePoints(han, fu) * 4);
          parts.push(`ロン ${ronPts}`);
        }
        document.getElementById("editPointsDisplay").textContent =
          `${han}翻 ${fu}符 → ${parts.join(" ")}`;
      }

      function confirmEntry() {
        if (!editState) return;
        const han = parseInt(document.getElementById("editHan").value) || 0;
        const fu = parseInt(document.getElementById("editFu").value) || 0;
        const isDealer = editState.input.win.jikaze === "east";
        const isTsumo = editState.input.win.win_type === "tsumo";
        const { oya_payment, ko_payment } = calcPayments(han, fu, isDealer, isTsumo);
        const entry = {
          input: editState.input,
          output: {
            han,
            fu: fu || null,
            oya_payment,
            ko_payment,
            yaku: editState.yakuList.filter((y) => y.name)
          }
        };
        if (editState.editingIndex != null) {
          datasetEntries[editState.editingIndex] = entry;
        } else {
          datasetEntries.push(entry);
        }
        renderDatasetList();
        closeEditForm();
      }

      /* ── Dataset rendering ── */
      function renderDatasetList() {
        const listEl = document.getElementById("datasetList");
        listEl.innerHTML = "";
        datasetEntries.forEach((entry, idx) => {
          const div = document.createElement("div");
          div.className = "dataset-entry";
          const header = document.createElement("div");
          header.className = "dataset-entry-header";
          const label = document.createElement("strong");
          label.textContent = `#${idx + 1}: ${entry.output.han}翻 ${entry.output.fu || "-"}符`;
          header.appendChild(label);

          const btnGroup = document.createElement("div");
          btnGroup.style.cssText = "display:flex;gap:4px;";
          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.className = "mini-btn";
          editBtn.textContent = "編集";
          editBtn.style.marginTop = "0";
          editBtn.addEventListener("click", () => {
            openEditForm(entry.input, entry.output.yaku, entry.output.han, entry.output.fu, idx);
          });
          btnGroup.appendChild(editBtn);
          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "remove-entry-btn";
          removeBtn.textContent = "削除";
          removeBtn.addEventListener("click", () => {
            datasetEntries.splice(idx, 1);
            renderDatasetList();
          });
          btnGroup.appendChild(removeBtn);
          header.appendChild(btnGroup);
          div.appendChild(header);

          const yakuRow = document.createElement("div");
          yakuRow.className = "badge-row";
          (entry.output.yaku || []).forEach((y) => {
            const badge = document.createElement("span");
            badge.className = "badge";
            badge.textContent = y.han > 0 ? `${y.name} ${y.han}翻` : y.name;
            yakuRow.appendChild(badge);
          });
          div.appendChild(yakuRow);

          const info = document.createElement("div");
          info.className = "hint";
          const parts = [];
          if (entry.output.oya_payment != null) parts.push(`親払:${entry.output.oya_payment}`);
          if (entry.output.ko_payment != null) parts.push(`子払:${entry.output.ko_payment}`);
          if (!parts.length) parts.push("ロン");
          info.textContent = `${entry.output.han}翻 ${entry.output.fu || "-"}符 / ${parts.join(" ")}`;
          div.appendChild(info);
          listEl.appendChild(div);
        });

        document.getElementById("datasetJson").textContent = JSON.stringify(datasetEntries, null, 2);
      }

      /* ── Generate dataset entry ── */
      async function generateEntry() {
        const error = document.getElementById("error");
        error.textContent = "";

        let payload;
        try {
          payload = buildPayload();
        } catch (e) {
          error.textContent = e.message;
          return;
        }

        const res = await fetch("/api/v1/score", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          error.textContent = data.detail || "API呼び出しに失敗しました";
          return;
        }

        const { input, output } = convertToDatasetFormat(payload, data.result);
        openEditForm(input, output.yaku, output.han, output.fu, null);
      }

      /* ── Copy JSON ── */
      function copyJson() {
        const text = document.getElementById("datasetJson").textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("copyJsonBtn");
          btn.textContent = "コピーしました";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = "JSONをコピー";
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      /* ── GCS upload / list / download ── */
      async function uploadToGcs() {
        const status = document.getElementById("uploadStatus");
        status.textContent = "";
        if (!datasetEntries.length) {
          status.textContent = "データセットが空です。";
          return;
        }
        status.textContent = "アップロード中...";
        try {
          const res = await fetch("/api/v1/dataset/upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ entries: datasetEntries })
          });
          const data = await res.json();
          if (!res.ok) {
            status.textContent = `失敗: ${data.detail || "unknown error"}`;
            return;
          }
          status.textContent = `アップロード完了: gs://${data.storage.bucket}/${data.storage.object_name} (${data.count}件)`;
          refreshGcsList();
        } catch (e) {
          status.textContent = `通信エラー: ${e.message}`;
        }
      }

      async function refreshGcsList() {
        const listEl = document.getElementById("gcsFileList");
        const status = document.getElementById("gcsListStatus");
        status.textContent = "読み込み中...";
        listEl.innerHTML = "";
        try {
          const res = await fetch("/api/v1/dataset/list");
          const data = await res.json();
          if (!res.ok) {
            status.textContent = `取得失敗: ${data.detail || "unknown error"}`;
            return;
          }
          const files = data.files || [];
          if (!files.length) {
            status.textContent = "保存済みデータセットはありません。";
            return;
          }
          status.textContent = `${files.length}件`;
          files.forEach((f) => {
            const item = document.createElement("div");
            item.className = "gcs-file-item";

            const info = document.createElement("div");
            info.className = "gcs-file-info";
            const nameSpan = document.createElement("div");
            nameSpan.className = "file-name";
            nameSpan.textContent = f.name.split("/").pop();
            nameSpan.title = f.name;
            info.appendChild(nameSpan);
            const meta = document.createElement("div");
            meta.className = "file-meta";
            const date = f.updated ? new Date(f.updated).toLocaleString("ja-JP") : "-";
            const size = f.size != null ? `${(f.size / 1024).toFixed(1)}KB` : "-";
            meta.textContent = `${date} / ${size}`;
            info.appendChild(meta);
            item.appendChild(info);

            const btnGroup = document.createElement("div");
            btnGroup.style.cssText = "display:flex;gap:4px;flex-shrink:0;";

            const dlBtn = document.createElement("button");
            dlBtn.type = "button";
            dlBtn.className = "mini-btn";
            dlBtn.textContent = "DL";
            dlBtn.style.marginTop = "0";
            dlBtn.addEventListener("click", () => downloadGcsFile(f.name));
            btnGroup.appendChild(dlBtn);

            const loadBtn = document.createElement("button");
            loadBtn.type = "button";
            loadBtn.className = "mini-btn";
            loadBtn.textContent = "読込";
            loadBtn.style.marginTop = "0";
            loadBtn.style.background = "#0f766e";
            loadBtn.addEventListener("click", () => loadGcsFile(f.name));
            btnGroup.appendChild(loadBtn);

            item.appendChild(btnGroup);
            listEl.appendChild(item);
          });
        } catch (e) {
          status.textContent = `通信エラー: ${e.message}`;
        }
      }

      function downloadGcsFile(name) {
        const url = `/api/v1/dataset/download?name=${encodeURIComponent(name)}`;
        fetch(url)
          .then((res) => res.json())
          .then((data) => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = name.split("/").pop();
            a.click();
            URL.revokeObjectURL(a.href);
          })
          .catch((e) => alert(`ダウンロード失敗: ${e.message}`));
      }

      async function loadGcsFile(name) {
        const status = document.getElementById("gcsListStatus");
        try {
          const res = await fetch(`/api/v1/dataset/download?name=${encodeURIComponent(name)}`);
          const data = await res.json();
          if (!res.ok) {
            status.textContent = `読込失敗: ${data.detail || "unknown"}`;
            return;
          }
          const entries = data.payload?.entries || data.entries || [];
          if (!entries.length) {
            status.textContent = "データセットが空です。";
            return;
          }
          datasetEntries.length = 0;
          entries.forEach((e) => datasetEntries.push(e));
          renderDatasetList();
          status.textContent = `${entries.length}件を読み込みました。`;
        } catch (e) {
          status.textContent = `通信エラー: ${e.message}`;
        }
      }

      /* ── Event listeners ── */
      document.querySelectorAll('input[name="handPattern"]').forEach((el) => {
        el.addEventListener("change", () => switchPattern(el.value));
      });
      document.getElementById("jsonDirectSwitch").addEventListener("change", (e) => {
        const on = e.target.checked;
        uiState.jsonDirect = on;
        document.getElementById("handJsonInput").disabled = !on;
        setTileInputEnabled(!on);
        if (!on) {
          try { document.getElementById("handJsonInput").value = JSON.stringify(uiState.handJsonFromTiles, null, 2); } catch {}
        }
      });
      document.querySelectorAll('input[name="doraMode"]').forEach((el) => {
        el.addEventListener("change", () => syncDoraModeFromUi());
      });
      document.getElementById("addDoraTileBtn").addEventListener("click", () => {
        uiState.doraTiles.push(null);
        renderDoraInputs();
      });
      document.getElementById("addUraDoraTileBtn").addEventListener("click", () => {
        uiState.uraDoraTiles.push(null);
        renderDoraInputs();
      });
      document.getElementById("addDoraIndicatorBtn").addEventListener("click", () => {
        uiState.doraIndicators.push(null);
        renderDoraInputs();
      });
      document.getElementById("addUraDoraIndicatorBtn").addEventListener("click", () => {
        uiState.uraDoraIndicators.push(null);
        renderDoraInputs();
      });
      document.getElementById("generateBtn").addEventListener("click", generateEntry);
      document.getElementById("addYakuBtn").addEventListener("click", () => {
        if (!editState) return;
        editState.yakuList.push({ name: "", han: 1 });
        renderEditYakuList();
        syncHanFromYaku();
      });
      document.getElementById("editHan").addEventListener("input", recalcEditPoints);
      document.getElementById("editFu").addEventListener("input", recalcEditPoints);
      document.getElementById("confirmEntryBtn").addEventListener("click", confirmEntry);
      document.getElementById("cancelEditBtn").addEventListener("click", closeEditForm);
      document.getElementById("copyJsonBtn").addEventListener("click", copyJson);
      document.getElementById("uploadGcsBtn").addEventListener("click", uploadToGcs);
      document.getElementById("refreshGcsListBtn").addEventListener("click", refreshGcsList);
      document.getElementById("clearAllBtn").addEventListener("click", () => {
        datasetEntries.length = 0;
        renderDatasetList();
      });

      /* ── Init ── */
      switchPattern("standard");
      renderDoraInputs();
      syncHandJsonFromState();
      refreshGcsList();
    </script>
  </body>
</html>
